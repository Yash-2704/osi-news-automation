# ============================================
# OSI News Automation System - News Sources Configuration
# ============================================
# Source Restructuring: Wire-service-first strategy
# Last Updated: 2026-04-01
# 
# TIER 1 (Priority 1): Global outlets covering the same top stories
#   - BBC, Al Jazeera, AP, Guardian, Sky News, DW, Euronews,
#     France 24, ABC AU, CNA
# TIER 2 (Priority 2): Regional outlets with international coverage
# TIER 3 (Priority 3): Specialist/niche sources
# TIER 4 (Priority 4): Low-priority, scraped every 3rd run
#
# IMPORTANT: Always respect robots.txt and terms of service
# Use rate limiting to avoid being blocked
# ============================================

sources:
sources:
  - name: BBC News
    url: https://www.bbc.com/news
    rss_feed: https://feeds.bbci.co.uk/news/rss.xml
    backup_url: https://www.bbc.co.uk/news
    region: UK
    language: en
    scrape_method: newspaper3k
    selectors:
      article_list: div.gs-c-promo
      article_url: a.gs-c-promo-heading
      headline: h1#main-heading
      content: article[data-component='text-block']
    priority: 1
    enabled: true
    rate_limit_delay: 2
  - name: Reuters
    url: https://www.reuters.com
    rss_feed: https://news.yahoo.com/rss/  # FIXED: reuters.com (401) + feeds.reuters.com (DNS fail); Yahoo carries Reuters wire, 50 entries verified
    backup_url: https://www.reuters.com/world
    region: International
    language: en
    scrape_method: newspaper3k
    selectors:
      article_list: div.media-story-card
      article_url: a[data-testid='Heading']
      headline: h1[data-testid='Heading']
      content: div[data-testid='article-body']
    priority: 1
    enabled: true
    rate_limit_delay: 3
