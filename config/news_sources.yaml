# ============================================
# OSI News Automation System - News Sources Configuration
# ============================================
# 25 International News Sources for Scraping
# Last Updated: 2026-01-15
# 
# IMPORTANT: Always respect robots.txt and terms of service
# Use rate limiting to avoid being blocked
# ============================================

sources:
  # ===========================================
  # TIER 1: Major International News (Priority 1)
  # ===========================================
  
  - name: "BBC News"
    url: "https://www.bbc.com/news"
    rss_feed: "https://feeds.bbci.co.uk/news/rss.xml"
    backup_url: "https://www.bbc.co.uk/news"
    region: "UK"
    language: "en"
    scrape_method: "newspaper3k"
    selectors:
      article_list: "div.gs-c-promo"
      article_url: "a.gs-c-promo-heading"
      headline: "h1#main-heading"
      content: "article[data-component='text-block']"
    priority: 1
    enabled: true
    rate_limit_delay: 2

  - name: "Reuters"
    url: "https://www.reuters.com"
    rss_feed: "https://www.reuters.com/rssfeed/topNews"
    backup_url: "https://www.reuters.com/world"
    region: "International"
    language: "en"
    scrape_method: "newspaper3k"
    selectors:
      article_list: "div.media-story-card"
      article_url: "a[data-testid='Heading']"
      headline: "h1[data-testid='Heading']"
      content: "div[data-testid='article-body']"
    priority: 1
    enabled: false  # 401 Forbidden on every request — March 2026
    rate_limit_delay: 3

  - name: "Al Jazeera"
    url: "https://www.aljazeera.com"
